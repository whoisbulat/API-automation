name: API Tests
run-name: Test ${{ github.event.inputs.ENV }} | ${{ github.event.inputs.MARKER }} marker | ${{ github.event.inputs.THREADS }} threads

on:
  workflow_dispatch:
    inputs:
      ENV:
        description: 'Environment (dev or release)'
        required: true
        type: choice
        default: 'dev'
        options:
          - 'dev'
          - 'release'

      MARKER:
        description: 'Tests marker'
        required: true
        type: choice
        default: 'smoke'
        options:
          - smoke
          - regression

      THREADS:
        description: 'Parallel threads'
        required: false
        type: choice
        default: '1'
        options:
          - '1'
          - '3'

jobs:
  api-tests:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENV }}   # 👈 ключевая строка — привязка к окружению
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Allure environment
        run: |
          mkdir -p allure-results
          echo "Branch=${{ github.ref_name }}" > allure-results/environment.properties
          echo "Commit=${{ github.sha }}" >> allure-results/environment.properties
          echo "Stage=${{ inputs.ENV }}" >> allure-results/environment.properties
          echo "Marker=${{ inputs.MARKER }}" >> allure-results/environment.properties
          echo "Threads=${{ inputs.THREADS }}" >> allure-results/environment.properties

      - name: Run tests via docker-compose
        env:
          STAGE: ${{ inputs.ENV }}
          MARKER: ${{ inputs.MARKER }}
          THREADS: ${{ inputs.THREADS }}
          API_TOKEN: ${{ secrets.API_TOKEN }}   # 👈 GitHub  подставит нужный токен из окружения
        run: |
          docker compose up smoke-api-test

      - name: Generate Allure report
        run: |
          docker compose up report

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: allure-report
          clean: false